# TheSelective — PIDiff-style single-head + van der Waals physics loss (from-scratch)
# - Single-head KGDiff-style loss_exp (use_dual_head_sam_pl: False)
# - PIDiff Lennard-Jones vdW loss with PIDiff-style curriculum ramp (it / vdw_ramp_iters)
# Run:  python scripts/train_diffusion.py --config configs/training_pidiff_vdw_singlehead.yml

data:
  name: pl
  path: ./data/crossdocked_v1.1_rmsd1.0_pocket10_processed_final.lmdb
  split: ./data/crossdocked_pocket10_pose_split.pt
  transform:
    ligand_atom_mode: add_aromatic
    random_rot: False

model:
  # Diffusion settings
  model_mean_type: C0
  beta_schedule: sigmoid
  beta_start: 1.e-7
  beta_end: 2.e-3
  v_beta_schedule: cosine
  v_beta_s: 0.01
  num_diffusion_timesteps: 1000
  loss_v_weight: 100.
  loss_exp_weight: 1.
  # Physics-informed van der Waals loss (PIDiff).
  # Effective weight = loss_vdw_weight * (it / vdw_ramp_iters)  [applied in the train loop]
  loss_vdw_weight: 1.0          # set 0. to disable (use for the no-physics baseline run)
  vdw_loss_mode: pidiff_exact   # 'pidiff_exact' (PIDiff sum dE/dd, double backward) | 'lj' (clean LJ12-6 energy)
  vdw_dm_min: 0.5
  sample_time_method: symmetric
  affinity_with_diffusion: False
  use_classifier_guide: True

  # Time embedding
  time_emb_dim: 0
  time_emb_mode: simple
  center_pos_mode: protein

  # Model architecture
  node_indicator: True
  model_type: uni_o2
  num_blocks: 1
  num_layers: 9
  hidden_dim: 128
  n_heads: 16
  edge_feat_dim: 4
  num_r_gaussian: 20
  knn: 32
  num_node_types: 8
  act_fn: relu
  norm: True
  cutoff_mode: knn
  ew_net_type: global
  num_x2h: 1
  num_h2x: 1
  r_max: 10.
  x2h_out_fc: False
  sync_twoup: False

  # Dual Head Configuration
  use_dual_head_sam_pl: False   # single-head KGDiff-style loss_exp (per user: no dual head)
  head2_mode: bidirectional_query_atom

train:
  seed: 2021
  batch_size: 2
  num_workers: 0
  n_acc_batch: 2
  max_iters: 100000000
  vdw_ramp_iters: 200000        # PIDiff-style linear ramp: vdW weight grows as it / vdw_ramp_iters (uncapped)
  val_freq: 1000
  pos_noise_std: 0.1
  max_grad_norm: 8.0
  bond_loss_weight: 1.0
  optimizer:
    type: adam
    lr: 1.e-3
    weight_decay: 0
    beta1: 0.95
    beta2: 0.999
  scheduler:
    type: plateau
    factor: 0.95
    patience: 15
    min_lr: 1.e-5
